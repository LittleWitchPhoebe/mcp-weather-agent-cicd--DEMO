# 部署到服务器（可手动触发，或在 Build 成功完成后自动触发）
name: Deploy

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main, master]

permissions:
  contents: read

env:
  ACR_REGISTRY: crpi-tdt2zc9s3n24ef5b.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: test017/test-cicid

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    # 手动触发直接跑；由 Build 触发时仅当 Build 成功才跑
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: SSH 连接检查
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo ">>> 已连接服务器: $(hostname)"
            docker --version
            echo ">>> 连接正常，开始部署..."

      - name: 拉取镜像并部署
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_IMAGE: ${{ env.ACR_IMAGE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MODEL: ${{ secrets.MODEL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: ACR_REGISTRY,ACR_IMAGE,ACR_USERNAME,ACR_PASSWORD,DASHSCOPE_API_KEY,MODEL
          script: |
            set -e
            IMAGE="$ACR_REGISTRY/$ACR_IMAGE:latest"
            echo ">>> 登录阿里云 ACR..."
            echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
            echo ">>> 拉取镜像: $IMAGE"
            docker pull "$IMAGE"
            docker stop demo-ci-cd 2>/dev/null || true
            docker rm demo-ci-cd 2>/dev/null || true
            docker run -d --name demo-ci-cd -p 80:8000 --restart unless-stopped \
              -e DASHSCOPE_API_KEY="$DASHSCOPE_API_KEY" \
              -e MODEL="${MODEL:-qwen-plus}" \
              "$IMAGE"
            docker image prune -f
            echo ">>> 部署完成，访问: http://${{ secrets.DEPLOY_HOST }}"
