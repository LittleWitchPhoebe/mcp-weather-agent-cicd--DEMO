# 部署到服务器（可手动触发，或在 Build 成功完成后自动触发）
# Build 是 Deploy 的先决条件：仅当由 workflow_run 触发时，须 Build 成功才执行 Deploy
name: Deploy

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main, master]

permissions:
  contents: read

env:
  ACR_REGISTRY: crpi-tdt2zc9s3n24ef5b.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: test017/test-cicid

jobs:
  # 检查是否已配置部署主机（job 级 if 不能使用 secrets，用前置 job 输出）
  check:
    name: Check deploy config
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.set.outputs.run_deploy }}
    steps:
      - id: set
        run: |
          if [ -n "$DEPLOY_HOST" ]; then echo "run_deploy=true" >> $GITHUB_OUTPUT; else echo "run_deploy=false" >> $GITHUB_OUTPUT; fi
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: check
    # 仅当已配置部署主机 且（手动触发 或 Build 成功）时执行
    if: ${{ needs.check.outputs.run_deploy == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: SSH 连接检查
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ">>> 已连接服务器: $(hostname)"
            docker --version
            echo ">>> 连接正常，开始部署..."

      - name: 拉取镜像并部署
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_IMAGE: ${{ env.ACR_IMAGE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ACR_REGISTRY,ACR_IMAGE,ACR_USERNAME,ACR_PASSWORD
          script: |
            set -e
            IMAGE="$ACR_REGISTRY/$ACR_IMAGE:latest"
            echo ">>> 登录阿里云 ACR..."
            echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
            echo ">>> 拉取镜像: $IMAGE"
            docker pull "$IMAGE"
            docker stop demo-ci-cd 2>/dev/null || true
            docker rm demo-ci-cd 2>/dev/null || true
            docker run -d --name demo-ci-cd -p 80:80 --restart unless-stopped "$IMAGE"
            docker image prune -f
            echo ">>> 部署完成，访问: http://${{ secrets.DEPLOY_HOST }}"