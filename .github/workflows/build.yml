# 构建镜像并推送到阿里云个人版镜像仓库
name: Build

on:
  push:
    branches: [main, master]

permissions:
  contents: read

env:
  # 阿里云镜像仓库地址（公网），镜像全路径: <REGISTRY>/test017/test-cicid:<tag>
  ACR_REGISTRY: crpi-tdt2zc9s3n24ef5b.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: test017/test-cicid

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to 阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
